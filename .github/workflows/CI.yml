---
name: CI

permissions: {}

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - "**.md"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Check formatting
        run: mise dev:format-check

  ameba:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise dev:deps

      - name: Run static code analysis
        run: mise dev:ameba

  test_linux:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise dev:deps

      - name: Run tests
        run: mise dev:spec

      - name: Run tests (multi-threaded)
        run: mise dev:spec-mt

  # Best-effort early warning against the Crystal nightly compiler. mise has no
  # nightly build, so this job uses the nightly container directly and is allowed
  # to fail.
  test_nightly_linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    container: crystallang/crystal:nightly
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: shards install --skip-postinstall --skip-executables

      - name: Run tests
        run: crystal spec --error-trace

      - name: Run tests (multi-threaded)
        run: crystal spec --error-trace -Dpreview_mt
        env:
          CRYSTAL_WORKERS: "4"

  test_macos_arm64:
    runs-on: macos-26
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      # TODO: remove me when https://github.com/crystal-lang/crystal/issues/16746 is fixed
      - name: Fix Crystal shards
        run: mise dev:fix-shards-command

      - name: Install dependencies
        run: mise dev:deps

      - name: Run tests
        run: mise dev:spec

      - name: Run tests (multi-threaded)
        run: mise dev:spec-mt

  test_macos_amd64:
    runs-on: macos-26-intel
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v4

      # TODO: remove me when https://github.com/crystal-lang/crystal/issues/16746 is fixed
      - name: Fix Crystal shards
        run: mise dev:fix-shards-command

      - name: Install dependencies
        run: mise dev:deps

      - name: Run tests
        run: mise dev:spec

      - name: Run tests (multi-threaded)
        run: mise dev:spec-mt
